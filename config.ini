[core]
runtime = BrainLanguageRuntime (BLR)
engine_version = 2.0.26
default_locale = en_US
fallback_locale = es_AR
latency_ms = 45
context_switching_auto = true

[vocabulary]
cache_size_words = 45000
active_memory_allocation = high
slang_allowed = true
idioms_index = expanded
garbage_collection_interval = 86400s ; Daily sleep cycle clears unconsolidated ephemeral terms

[grammar_engine]
strict_mode = false
auto_correct_prepositions = true
phrasal_verbs_parsing = heavy
irregular_verbs_lookup = hardcoded_in_vram ; Low-latency direct access for common exceptions

[audio_processing]
input_accent_filtering = multi_pass
output_accent_modulation = slight_latam_tint ; Slight Latin American tint in phonetic modulation
phoneme_buffer_size = 1024

[storage_paths]
long_term_memory = /brain/synapses/cortex/languages/en_US
active_buffer = /brain/hippocampus/temp_speech